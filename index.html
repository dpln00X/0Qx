<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dolphin0x | Live Feed</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { margin: 0; background-color: #0b1120; color: #f8fafc; padding: 0; padding-bottom: 40px; }
        
        header { background: #0f172a; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
        header h1 { margin: 0; font-size: 1.4rem; color: #38bdf8; }
        .btn-admin-login { background: transparent; border: 1px solid #475569; color: #94a3b8; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
        .btn-admin-login.logged-in { border-color: #ef4444; color: #ef4444; }

        .container { max-width: 600px; margin: 0 auto; padding: 15px; }

        /* ADMIN PANEL */
        .admin-panel { display: none; background: #1e293b; border: 1px solid #38bdf8; padding: 20px; border-radius: 16px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .admin-panel h2 { margin-top: 0; color: #38bdf8; font-size: 1.2rem; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.9rem; }
        .form-group input[type="text"], .form-group textarea { width: 100%; background: #0f172a; border: 1px solid #475569; color: white; padding: 12px; border-radius: 8px; outline: none; font-size: 1rem; }
        .btn-submit { width: 100%; background: #38bdf8; color: #0b1120; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; }

        /* FEED */
        .feed { display: flex; flex-direction: column; gap: 25px; }
        .post-card { background: #1e293b; border-radius: 16px; border: 1px solid #334155; overflow: hidden; }
        .post-img { width: 100%; max-height: 350px; object-fit: cover; display: block; background: #0f172a; }
        .post-content { padding: 20px; }
        .post-date { color: #64748b; font-size: 0.8rem; margin-bottom: 5px; }
        .post-title { margin: 0 0 10px 0; font-size: 1.3rem; color: #fff; }
        .post-text { color: #cbd5e1; line-height: 1.5; font-size: 0.95rem; margin-bottom: 20px; white-space: pre-wrap; }

        /* REACTIES */
        .comments-section { border-top: 1px solid #334155; padding-top: 15px; margin-top: 15px; }
        .comments-title { font-size: 0.9rem; color: #94a3b8; margin-bottom: 10px; font-weight: bold; }
        .comment-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .comment { background: #0f172a; padding: 10px 14px; border-radius: 10px; font-size: 0.9rem; }
        .comment-author { color: #38bdf8; font-weight: bold; margin-bottom: 2px; }
        .comment-text { color: #e2e8f0; }

        .comment-form { display: flex; flex-direction: column; gap: 8px; }
        .comment-input-row { display: flex; gap: 8px; }
        .comment-name { width: 30%; background: #0f172a; border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; outline: none; font-size: 0.9rem; }
        .comment-msg { flex-grow: 1; background: #0f172a; border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; outline: none; font-size: 0.9rem; }
        .btn-comment { background: #38bdf8; color: #0b1120; border: none; padding: 10px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <h1>Dolphin0x Live Feed</h1>
        <button id="adminLoginBtn" class="btn-admin-login" onclick="handleAdminPoort()">🔒 Login</button>
    </header>

    <div class="container">
        
        <div id="adminPanel" class="admin-panel">
            <h2>Nieuw bericht plaatsen</h2>
            <div class="form-group">
                <label>Titel van je post</label>
                <input type="text" id="postTitle" placeholder="Bijv: Live database gekoppeld!">
            </div>
            <div class="form-group">
                <label>Afbeelding kiezen</label>
                <input type="file" id="postImage" accept="image/*">
            </div>
            <div class="form-group">
                <label>Jouw verhaal / Tekst</label>
                <textarea id="postText" rows="5" placeholder="Typ hier je bericht..."></textarea>
            </div>
            <button class="btn-submit" onclick="publiceerPost()">Gooi live online 🚀</button>
        </div>

        <div id="feedContainer" class="feed">
            <p style="text-align:center; color:#64748b; margin-top:40px;">Berichten live aan het ophalen...</p>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, orderBy, query, doc, updateDoc, arrayUnion, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // ⚠️ VERVANG DEZE GEGEVENS MET JOUW EIGEN FIREBASE CONFIG!
        const firebaseConfig = {
            apiKey: "HIER_JOUW_API_KEY",
            authDomain: "HIER_JOUW_AUTH_DOMAIN",
            projectId: "HIER_JOUW_PROJECT_ID",
            storageBucket: "HIER_JOUW_STORAGE_BUCKET",
            messagingSenderId: "HIER_JOUW_MESSAGING_SENDER_ID",
            appId: "HIER_JOUW_APP_ID"
        };

        // Start Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let isAdmin = false;
        const ADMIN_WACHTWOORD = "dolphin2026";
        let gekozenAfbeeldingBase64 = "";

        // Foto omzetten naar tekst zodat het in Firestore past
        document.getElementById('postImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // Maak foto iets kleiner om Firestore limieten te sparen (max 1MB per post)
                const reader = new FileReader();
                reader.onloadend = function() {
                    gekozenAfbeeldingBase64 = reader.result;
                }
                reader.readAsDataURL(file);
            }
        });

        // Admin Login functie beschikbaar maken voor de HTML knop
        window.handleAdminPoort = function() {
            if (isAdmin) {
                isAdmin = false;
                document.getElementById('adminPanel').style.display = 'none';
                document.getElementById('adminLoginBtn').innerText = "🔒 Login";
                document.getElementById('adminLoginBtn').classList.remove('logged-in');
            } else {
                let wachtwoordInvullen = prompt("Voer het Admin Wachtwoord in:");
                if (wachtwoordInvullen === ADMIN_WACHTWOORD) {
                    isAdmin = true;
                    document.getElementById('adminPanel').style.display = 'block';
                    document.getElementById('adminLoginBtn').innerText = "🔓 Log uit";
                    document.getElementById('adminLoginBtn').classList.add('logged-in');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    bouwFeedUI(HuidigePosts); // Update om verwijderknoppen te tonen
                } else if (wachtwoordInvullen !== null) {
                    alert("Fout wachtwoord!");
                }
            }
        }

        // Post echt opslaan in Firebase Cloud
        window.publiceerPost = async function() {
            const titel = document.getElementById('postTitle').value.trim();
            const tekst = document.getElementById('postText').value.trim();

            if (!titel || !tekst) {
                alert("Vul een titel en tekst in!");
                return;
            }

            try {
                await addDoc(collection(db, "posts"), {
                    title: titel,
                    text: tekst,
                    image: gekozenAfbeeldingBase64,
                    timestamp: Date.now(),
                    dateString: new Date().toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' }),
                    comments: []
                });

                // Reset het formulier
                document.getElementById('postTitle').value = '';
                document.getElementById('postText').value = '';
                document.getElementById('postImage').value = '';
                gekozenAfbeeldingBase64 = "";
            } catch (e) {
                alert("Fout bij uploaden: " + e.message);
            }
        }

        // Reactie toevoegen aan Firebase document
        window.voegReactieToe = async function(postId) {
            const naamInput = document.getElementById(`name_${postId}`);
            const msgInput = document.getElementById(`msg_${postId}`);
            const naam = naamInput.value.trim() || "Anoniem";
            const tekst = msgInput.value.trim();

            if (!tekst) return;

            const postRef = doc(db, "posts", postId);
            try {
                await updateDoc(postRef, {
                    comments: arrayUnion({
                        author: naam,
                        text: tekst,
                        timestamp: Date.now()
                    })
                });
                msgInput.value = '';
            } catch (e) {
                alert("Reactie plaatsen mislukt: " + e.message);
            }
        }

        // Post live deleten uit de cloud
        window.verwijderPost = async function(postId) {
            if(confirm("Weet je zeker dat je deze post wilt verwijderen uit de live database?")) {
                try {
                    await deleteDoc(doc(db, "posts", postId));
                } catch (e) {
                    alert("Verwijderen mislukt.");
                }
            }
        }

        let HuidigePosts = [];

        // 🌟 LIVE SYNCHRONISATIE MET FIREBASE (Real-time listener)
        // Telkens als jij of iemand anders een post of reactie plaatst, vernieuwt de site direct!
        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            HuidigePosts = [];
            snapshot.forEach((doc) => {
                HuidigePosts.push({ id: doc.id, ...doc.data() });
            });
            bouwFeedUI(HuidigePosts);
        });

        function bouwFeedUI(posts) {
            const container = document.getElementById('feedContainer');
            container.innerHTML = '';

            if (posts.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#64748b; margin-top:40px;">Er zijn nog geen live berichten geplaatst.</p>`;
                return;
            }

            posts.forEach(post => {
                let afbeeldingHTML = post.image ? `<img src="${post.image}" class="post-img" alt="Post Image">` : '';
                let verwijderKnopHTML = isAdmin ? `<button class="btn-admin-login" style="border-color:#ef4444; color:#ef4444; margin-top:10px; padding:4px 10px;" onclick="verwijderPost('${post.id}')">🗑️ Verwijder Post</button>` : '';

                let reactiesHTML = '';
                if(post.comments) {
                    post.comments.forEach(c => {
                        reactiesHTML += `
                            <div class="comment">
                                <div class="comment-author">@${escapeHtml(c.author)}</div>
                                <div class="comment-text">${escapeHtml(c.text)}</div>
                            </div>
                        `;
                    });
                }

                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    ${afbeeldingHTML}
                    <div class="post-content">
                        <div class="post-date">${post.dateString || ''}</div>
                        <h2 class="post-title">${escapeHtml(post.title)}</h2>
                        <div class="post-text">${escapeHtml(post.text)}</div>
                        ${verwijderKnopHTML}

                        <div class="comments-section">
                            <div class="comments-title">Reacties (${post.comments ? post.comments.length : 0})</div>
                            <div class="comment-list">${reactiesHTML}</div>
                            
                            <div class="comment-form">
                                <div class="comment-input-row">
                                    <input type="text" id="name_${post.id}" class="comment-name" placeholder="Naam...">
                                    <input type="text" id="msg_${post.id}" class="comment-msg" placeholder="Schrijf een reactie..." onkeypress="if(event.key === 'Enter') voegReactieToe('${post.id}')">
                                    <button class="btn-comment" onclick="voegReactieToe('${post.id}')">Drop</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function escapeHtml(text) {
            return text ? text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : '';
        }
    </script>
</body>
</html>
